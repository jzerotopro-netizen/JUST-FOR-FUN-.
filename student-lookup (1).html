<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GGU Student Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=VT323&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Share Tech Mono', monospace; min-height: 100vh; overflow-x: hidden; }

/* ===== LOGIN ===== */
#login-page {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; background: #f5f5f5; padding: 20px;
}
.login-logo { font-size: 52px; margin-bottom: 10px; }
.login-title {
  font-family: 'Playfair Display', serif; font-size: clamp(22px, 4vw, 36px);
  font-weight: 700; color: #111; letter-spacing: 2px; text-align: center; margin-bottom: 4px;
}
.login-sub { font-size: 11px; color: #aaa; letter-spacing: 4px; text-transform: uppercase; text-align: center; margin-bottom: 36px; }
.login-card {
  background: #fff; border: 1px solid #e0e0e0; box-shadow: 0 6px 32px rgba(0,0,0,0.07);
  border-radius: 8px; padding: 38px 42px; width: 100%; max-width: 420px;
}
.field-label { display: block; font-size: 10px; color: #aaa; letter-spacing: 3px; text-transform: uppercase; margin-bottom: 7px; }
.field-hint { font-size: 10px; color: #bbb; letter-spacing: 1px; font-style: italic; margin-left: 8px; text-transform: none; }
.field-input {
  width: 100%; background: #fafafa; border: 1.5px solid #e0e0e0; border-radius: 4px;
  color: #111; font-family: 'Share Tech Mono', monospace; font-size: 22px;
  padding: 12px 16px; outline: none; transition: all 0.2s; letter-spacing: 8px;
  margin-bottom: 20px; text-align: center;
}
.field-input:focus { border-color: #111; background: #fff; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
.field-input::placeholder { color: #ddd; letter-spacing: 4px; font-size: 16px; }
.divider { border: none; border-top: 1px solid #f0f0f0; margin: 4px 0 20px; }
.submit-btn {
  width: 100%; background: #111; border: none; color: #fff;
  font-family: 'Share Tech Mono', monospace; font-size: 12px; font-weight: 700;
  padding: 15px; cursor: pointer; letter-spacing: 5px; text-transform: uppercase;
  transition: all 0.2s; border-radius: 4px; margin-top: 2px;
}
.submit-btn:hover { background: #222; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(0,0,0,0.12); }
.submit-btn:active { transform: translateY(0); }
.login-error { color: #cc2200; font-size: 11px; text-align: center; margin-top: 14px; min-height: 16px; letter-spacing: 1px; }
.login-footer { font-size: 10px; color: #ccc; text-align: center; margin-top: 28px; letter-spacing: 1px; line-height: 2; }

/* ===== LOADING ===== */
#loading-page {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: #000; z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
}
.scanline {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,255,65,0.025) 3px, rgba(0,255,65,0.025) 4px);
  z-index: 999; pointer-events: none;
}
.loading-inner { position: relative; z-index: 10; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 580px; }
.loading-skull { font-size: 76px; margin-bottom: 18px; filter: drop-shadow(0 0 18px #00ff41); animation: skull-rock 0.4s ease-in-out infinite alternate; }
@keyframes skull-rock { from{transform:rotate(-9deg) scale(1)} to{transform:rotate(9deg) scale(1.08)} }
.hack-log { font-family:'VT323',monospace; font-size:17px; width:100%; height:175px; overflow:hidden; border:1px solid #1a3d1a; padding:10px 14px; background:rgba(0,12,0,0.92); margin-bottom:16px; }
.ll { margin-bottom:3px; animation:lin 0.2s ease-in; }
@keyframes lin{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
.lg{color:#00ff41}.lr{color:#ff0040}.ly{color:#ffff00}.lc{color:#00ffff}
.prog-wrap{width:100%;margin-bottom:10px}
.prog-row{display:flex;justify-content:space-between;font-size:10px;color:#444;margin-bottom:4px;font-family:'Share Tech Mono',monospace}
.prog-bg{background:#050505;border:1px solid #00ff41;height:18px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,#003300,#00ff41);width:0%;transition:width 0.1s linear;box-shadow:0 0 8px #00ff41}
.stat-txt{font-family:'VT323',monospace;font-size:24px;color:#ffff00;text-align:center;animation:blk 0.6s step-end infinite}
@keyframes blk{50%{opacity:0}}

/* ===== RESULT ===== */
#result-page {
  display: none; position: relative; min-height: 100vh; padding: 24px 16px;
  flex-direction: column; align-items: center; background: #000; font-family: 'Share Tech Mono', monospace;
}
.res-inner { position:relative; z-index:5; width:100%; max-width:570px; display:flex; flex-direction:column; align-items:center; }
.res-title { font-family:'Orbitron',monospace; font-size:clamp(10px,2.4vw,17px); font-weight:900; color:#ff0040; text-align:center; letter-spacing:3px; margin-bottom:10px; text-shadow:0 0 8px #ff0040; animation:gtch 2.5s infinite; }
@keyframes gtch{0%,87%,100%{color:#ff0040;transform:none}88%{color:#00ffff;transform:translateX(-2px)}89%{color:#ff0040;transform:translateX(2px)}90%{transform:none}}
.cdown-wrap{width:100%;display:flex;align-items:center;gap:10px;margin-bottom:14px}
.cdown-lbl{font-family:'VT323',monospace;font-size:20px;color:#ff0040;white-space:nowrap}
.cdown-bar{flex:1;background:#110000;border:1px solid #ff0040;height:10px;overflow:hidden}
.cdown-fill{height:100%;background:linear-gradient(90deg,#ff0040,#ffff00);width:100%;transition:width 1s linear}
.cdown-num{font-family:'VT323',monospace;font-size:38px;color:#ffff00;text-shadow:0 0 10px #ffff00;min-width:46px;text-align:center}
.student-card{background:rgba(0,10,0,0.97);border:2px solid #00ff41;width:100%;box-shadow:0 0 40px rgba(0,255,65,0.12);overflow:hidden;position:relative}
.card-bar{background:rgba(0,255,65,0.07);border-bottom:1px solid #00ff41;padding:9px 18px;display:flex;justify-content:space-between;align-items:center}
.card-bar span{font-size:10px;color:#444;letter-spacing:2px}
.stamp{position:absolute;top:55px;right:12px;border:3px solid rgba(255,0,64,0.3);color:rgba(255,0,64,0.28);font-family:'Orbitron',monospace;font-size:18px;font-weight:900;padding:3px 8px;transform:rotate(-15deg);letter-spacing:2px;pointer-events:none}
.card-body{padding:22px 24px}
.sname{font-family:'Orbitron',monospace;font-size:clamp(13px,3vw,21px);font-weight:900;color:#00ff41;text-shadow:0 0 8px #00ff41;margin-bottom:18px;word-break:break-word}
.sname::after{content:'_';animation:blk 0.7s step-end infinite}
.igrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ii{background:rgba(0,255,65,0.02);border:1px solid #0c2a0c;padding:9px 12px}
.ii.fw{grid-column:1/-1}
.ik{font-size:9px;color:#333;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.iv{font-size:14px;color:#00ff41;letter-spacing:1px}
.iv.hi{color:#ffff00;text-shadow:0 0 4px #ffff00}.iv.rd{color:#ff0040}.iv.cy{color:#00ffff}
.cbadge{display:inline-block;padding:1px 8px;border:1px solid;font-size:11px;font-weight:bold;letter-spacing:2px}
.csc{border-color:#ff6600;color:#ff6600}.cst{border-color:#ff00ff;color:#ff00ff}
.cobc{border-color:#00ffff;color:#00ffff}.cgen{border-color:#00ff41;color:#00ff41}.coth{border-color:#ffff00;color:#ffff00}

/* ===== MONKEY ===== */
#monkey-page {
  display: none; position: fixed; top:0; left:0; width:100%; height:100%;
  background: #000; z-index: 200; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;
}
.moji { font-size: 0px; display: block; margin-bottom: 16px; }
.monkey-img {
  width: 240px; height: 240px; border-radius: 50%; object-fit: cover;
  border: 4px solid #00ff41; box-shadow: 0 0 30px #00ff41, 0 0 60px rgba(0,255,65,0.3);
  animation: monkey-bounce 0.5s ease-in-out infinite alternate;
  margin-bottom: 20px;
}
@keyframes monkey-bounce { from{transform:translateY(0) rotate(-5deg) scale(1)} to{transform:translateY(-20px) rotate(5deg) scale(1.05)} }
.mtitle { font-family:'VT323',monospace; font-size:clamp(28px,7vw,54px); margin-bottom:14px; animation:rnb 0.9s linear infinite; }
@keyframes rnb{0%{color:#ff0040}20%{color:#ffff00}40%{color:#00ff41}60%{color:#00ffff}80%{color:#ff00ff}100%{color:#ff0040}}
.mpin { font-family:'Orbitron',monospace; font-size:clamp(12px,2.8vw,20px); color:#00ff41; letter-spacing:3px; margin-bottom:8px; text-shadow:0 0 8px #00ff41; }
.msub { font-size:12px; color:#2a2a2a; margin-bottom:28px; font-family:'Share Tech Mono',monospace; }
.ragain { background:transparent; border:2px solid #ff0040; color:#ff0040; font-family:'Orbitron',monospace; font-size:12px; font-weight:700; padding:12px 28px; cursor:pointer; letter-spacing:3px; text-transform:uppercase; transition:all 0.2s; }
.ragain:hover { background:rgba(255,0,64,0.12); box-shadow:0 0 18px rgba(255,0,64,0.35); }
.monkey-countdown { font-family:'Share Tech Mono',monospace; font-size:18px; color:#444; margin-top:10px; letter-spacing:2px; }
.monkey-countdown span { color:#ff0040; font-weight:bold; font-size:24px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-page">
  <div class="login-logo">🎓</div>
  <div class="login-title">GGU Student Portal</div>
  <div class="login-sub">Secure Academic Records Access</div>

  <div class="login-card">
    <label class="field-label">PIN Number <span class="field-hint">— Enter last 4 digits of your PIN</span></label>
    <input class="field-input" id="pin-input" type="text" placeholder="- - - -" maxlength="4" autocomplete="off" inputmode="numeric" />

    <hr class="divider">

    <label class="field-label">Password <span class="field-hint">— Shhh, it's a secret 🤫</span></label>
    <input class="field-input" id="code-input" type="password" placeholder="••••••" maxlength="10" autocomplete="off" />

    <button class="submit-btn" onclick="startHack()">ACCESS RECORDS</button>
    <div class="login-error" id="err-msg"></div>
  </div>

  <div class="login-footer">
    GGU Academic Intelligence System &nbsp;·&nbsp; 2024<br>
    Authorised access only
  </div>
</div>

<!-- LOADING -->
<div id="loading-page">
  <canvas id="mc" style="position:fixed;top:0;left:0;width:100%;height:100%;opacity:0.13;z-index:0;pointer-events:none;"></canvas>
  <div class="scanline"></div>
  <div class="loading-inner">
    <div class="loading-skull">💀</div>
    <div class="hack-log" id="hack-log"></div>
    <div class="prog-wrap">
      <div class="prog-row"><span>BREACHING FIREWALL...</span><span id="pp">0%</span></div>
      <div class="prog-bg"><div class="prog-fill" id="pf"></div></div>
    </div>
    <div class="stat-txt" id="st">INITIALIZING...</div>
  </div>
</div>

<!-- RESULT -->
<div id="result-page">
  <canvas id="rc" style="position:fixed;top:0;left:0;width:100%;height:100%;opacity:0.08;z-index:0;pointer-events:none;"></canvas>
  <div class="scanline"></div>
  <div class="res-inner">
    <div class="res-title">🔓 FILE DECRYPTED — INTEL ACQUIRED 🔓</div>
    <div class="cdown-wrap">
      <div class="cdown-lbl">⏱ SELF-DESTRUCTS:</div>
      <div class="cdown-bar"><div class="cdown-fill" id="cf"></div></div>
      <div class="cdown-num" id="ct">10</div>
    </div>
    <div class="student-card">
      <div class="card-bar">
        <span>🔐 STUDENT_INTEL.DAT</span>
        <span id="cpt"></span>
      </div>
      <div class="stamp">CLASSIFIED</div>
      <div class="card-body">
        <div class="sname" id="sname"></div>
        <div class="igrid" id="igrid"></div>
      </div>
    </div>
  </div>
</div>

<!-- MONKEY -->
<div id="monkey-page">
  <img class="monkey-img" id="monkey-img" src="" alt="monkey" />
  <div class="mtitle">TIME'S UP, MONKEY! 🍌</div>
  <button class="ragain" onclick="resetAll()">🔄 RETURN</button>
</div>

function makeMatrix(id) {
  const c = document.getElementById(id); if(!c) return;
  const x = c.getContext('2d');
  c.width = window.innerWidth; c.height = window.innerHeight;
  const cols = Math.floor(c.width/20), drops = Array(cols).fill(1);
  return setInterval(()=>{
    x.fillStyle='rgba(0,0,0,0.05)'; x.fillRect(0,0,c.width,c.height);
    x.fillStyle='#00ff41'; x.font='14px monospace';
    drops.forEach((y,i)=>{
      x.fillText(String.fromCharCode(0x30A0+Math.random()*96),i*20,y*20);
      if(y*20>c.height&&Math.random()>0.975) drops[i]=0;
      drops[i]++;
    });
  },50);
}

let t1,t2,tcd,curPin="";

function startHack(){
  const pin=document.getElementById('pin-input').value.trim();
  const raw=document.getElementById('code-input').value.trim().toUpperCase().replace(/\s/g,'');
  const err=document.getElementById('err-msg');
  err.textContent='';
  if(!pin){err.textContent="Enter your PIN number.";return;}
  if(!/^\d{4}$/.test(pin)){err.textContent="PIN must be exactly 4 digits.";return;}
  if(!raw){err.textContent="Password is required.";return;}
  if(!CODES.includes(raw)){err.textContent="Invalid password.";return;}
  if(!DB[pin]){err.textContent="Record not found for this PIN.";return;}
  curPin=pin;
  document.getElementById('login-page').style.display='none';
  document.getElementById('loading-page').style.display='flex';
  t1=makeMatrix('mc');
  runLoad();
}

function runLoad(){
  const log=document.getElementById('hack-log'),fill=document.getElementById('pf'),pct=document.getElementById('pp'),st=document.getElementById('st');
  log.innerHTML=''; fill.style.width='0%';
  let li=0,prog=0;
  const li2=setInterval(()=>{
    if(li<LOGS.length){
      const d=document.createElement('div');
      d.className=`ll ${LOGS[li].c}`; d.textContent=LOGS[li].t;
      log.appendChild(d); log.scrollTop=log.scrollHeight; li++;
    }
  },300);
  const pi=setInterval(()=>{
    prog=Math.min(prog+Math.random()*4+1,100);
    fill.style.width=prog+'%'; pct.textContent=Math.floor(prog)+'%';
    st.textContent=STATS[Math.min(Math.floor(prog/100*STATS.length),STATS.length-1)];
  },100);
  setTimeout(()=>{
    clearInterval(li2); clearInterval(pi);
    fill.style.width='100%'; pct.textContent='100%'; st.textContent='ACCESS GRANTED!!!';
    setTimeout(()=>{ document.getElementById('loading-page').style.display='none'; clearInterval(t1); showResult(curPin); },600);
  },5000);
}

function showResult(pin){
  const s=DB[pin];
  document.getElementById('result-page').style.display='flex';
  t2=makeMatrix('rc');
  document.getElementById('cpt').textContent=s.full;
  document.getElementById('sname').textContent=s.name;
  const cm={SC:'csc',ST:'cst',OBC:'cobc',GENERAL:'cgen',GENARAL:'cgen',OTHERS:'coth','':'coth'};
  const cc=cm[s.cat]||'cgen';
  const sx=s.sex==='MALE'?'♂ MALE':s.sex==='FEMALE'?'♀ FEMALE':'? UNKNOWN';
  document.getElementById('igrid').innerHTML=`
    <div class="ii fw"><div class="ik">📌 Full PIN</div><div class="iv hi">${s.full}</div></div>
    <div class="ii"><div class="ik">🏛 Dept</div><div class="iv cy">${s.dept||'N/A'}</div></div>
    <div class="ii"><div class="ik">🎓 Programme</div><div class="iv">${s.prog||'N/A'}</div></div>
    <div class="ii"><div class="ik">🏷 Category</div><div class="iv"><span class="cbadge ${cc}">${s.cat||'N/A'}</span></div></div>
    <div class="ii"><div class="ik">⚧ Gender</div><div class="iv">${sx}</div></div>
    <div class="ii fw"><div class="ik">💰 Scholarship</div><div class="iv rd">${s.sch||'NOT AVAILABLE'}</div></div>
    <div class="ii fw"><div class="ik">📍 State</div><div class="iv">${s.state||'UNKNOWN'}</div></div>
  `;
  startCd(pin);
}

function startCd(pin){
  let secs=10;
  const el=document.getElementById('ct'),fill=document.getElementById('cf');
  el.textContent=secs; fill.style.width='100%';
  fill.style.background='linear-gradient(90deg,#ff0040,#ffff00)';
  el.style.color='#ffff00'; el.style.textShadow='0 0 10px #ffff00';
  clearInterval(tcd);
  tcd=setInterval(()=>{
    secs--;
    el.textContent=secs;
    fill.style.width=(secs/10*100)+'%';
    if(secs<=5){fill.style.background='#ff0040';el.style.color='#ff0040';el.style.textShadow='0 0 12px #ff0040';}
    if(secs<=0){clearInterval(tcd);clearInterval(t2);showMonkey(pin);}
  },1000);
}

function showMonkey(pin){
  const s=DB[pin];
  document.getElementById('result-page').style.display='none';
  document.getElementById('monkey-page').style.display='flex';
  document.getElementById('monkey-img').src=MONKEY_SRC;

}

function resetAll(){
  clearInterval(tcd);clearInterval(t1);clearInterval(t2);
  ['monkey-page','result-page','loading-page'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('login-page').style.display='flex';
  document.getElementById('pin-input').value='';
  document.getElementById('code-input').value='';
  document.getElementById('err-msg').textContent='';
  document.getElementById('ct').style.color='#ffff00';
  document.getElementById('ct').style.textShadow='0 0 10px #ffff00';
}

document.getElementById('pin-input').addEventListener('input',function(){this.value=this.value.replace(/\D/g,'').slice(0,4);});
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('login-page').style.display!=='none')startHack();});
